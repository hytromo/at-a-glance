# The pricing API restricts direct API calls from a browser.
# Prices change only once daily, so we can cache the prices daily instead
name: Refresh prices

on:
  schedule:
    - cron: "15 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

# TODO: make it push, also, do we need to manually trigger the website generation (through workflow dispatch?)
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Update price file
        run: |
          bun run scripts/update-prices.ts

      - name: Check if changes
        id: has-changes
        run: |
          if ! git diff --quiet HEAD; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: ${{ steps.has-changes.outputs.value == 'true' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "Update electricity pricing data"
          git push

      - name: Run static workflow
        if: ${{ steps.has-changes.outputs.value == 'true' }}
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: static.yml
